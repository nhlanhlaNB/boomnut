<!-- 
FIXED PayPal Subscription Buttons
Replace the old broken buttons on boomnut.co.za/pricing with these
These buttons now properly save subscriptions to Firebase Realtime Database
-->

<!-- ===== FIXED $3 PREMIUM PLAN BUTTON ===== -->
<div id="paypal-button-container-P-51711759R0127122YNHA4ITY"></div>
<script src="https://www.paypal.com/sdk/js?client-id=AV4Blmjwp981Sl85YsvLyCpdJC1qCdRnZ-Y6jzQNcFtEr9laPnG8zt3fQffQpBUmUzEo0UUlBd_McFGe&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>
<script>
  paypal.Buttons({
      style: {
          shape: 'rect',
          color: 'gold',
          layout: 'vertical',
          label: 'subscribe'
      },
      createSubscription: function(data, actions) {
        return actions.subscription.create({
          /* Creates the subscription */
          plan_id: 'P-51711759R0127122YNHA4ITY'
        });
      },
      onApprove: async function(data, actions) {
        try {
          console.log('✅ PayPal approved. Subscription ID:', data.subscriptionID);
          
          // Get user info from localStorage
          const userId = localStorage.getItem('userId');
          const userEmail = localStorage.getItem('userEmail');
          
          if (!userId || !userEmail) {
            alert('❌ User information not found. Please sign in again.');
            return;
          }
          
          // Call backend API to save subscription to Firebase
          const response = await fetch('/api/subscription/create', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              userId: userId,
              email: userEmail,
              plan: 'premium',
              subscriptionId: data.subscriptionID,
            }),
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Failed to save subscription');
          }
          
          const result = await response.json();
          console.log('✅ Subscription saved to database:', result);
          
          alert(`✅ Successfully subscribed to Premium plan!\n\nYour subscription will auto-renew in 30 days.\n\nRefresh to see changes!`);
          
          // Reload page after 2 seconds so Firebase write completes
          setTimeout(() => {
            window.location.reload();
          }, 2000);
          
        } catch (error) {
          console.error('❌ Error saving subscription:', error);
          alert('❌ Subscription created but failed to save to database.\n\nError: ' + error.message + '\n\nPlease try refreshing the page or contact support.');
        }
      },
      onError: function(err) {
        console.error('❌ PayPal error:', err);
        alert('Payment failed. Please try again.');
      }
  }).render('#paypal-button-container-P-51711759R0127122YNHA4ITY');
</script>
