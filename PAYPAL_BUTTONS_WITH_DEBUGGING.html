<!-- ===== FIXED $3 PREMIUM PLAN BUTTON WITH DEBUGGING ===== -->
<div id="paypal-button-container-P-51711759R0127122YNHA4ITY"></div>
<script src="https://www.paypal.com/sdk/js?client-id=AV4Blmjwp981Sl85YsvLyCpdJC1qCdRnZ-Y6jzQNcFtEr9laPnG8zt3fQffQpBUmUzEo0UUlBd_McFGe&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>
<script>
  paypal.Buttons({
      style: {
          shape: 'rect',
          color: 'gold',
          layout: 'vertical',
          label: 'subscribe'
      },
      createSubscription: function(data, actions) {
        console.log('[PAYPAL BUTTON] Creating subscription for Premium plan...');
        return actions.subscription.create({
          plan_id: 'P-51711759R0127122YNHA4ITY'
        });
      },
      onApprove: async function(data, actions) {
        try {
          console.log('========== SUBSCRIPTION FLOW START ==========');
          console.log('[1] ✅ PayPal approved. Subscription ID:', data.subscriptionID);
          
          // Check localStorage
          const userId = localStorage.getItem('userId');
          const userEmail = localStorage.getItem('userEmail');
          console.log('[2] Checking localStorage...');
          console.log('    userId:', userId ? '✓ Found' : '❌ NOT FOUND');
          console.log('    userEmail:', userEmail ? '✓ Found' : '❌ NOT FOUND');
          
          if (!userId || !userEmail) {
            console.error('[2] ❌ User information missing!');
            alert('❌ User information not found. Please sign in again.');
            return;
          }
          
          // Prepare request
          const requestBody = {
            userId: userId,
            email: userEmail,
            plan: 'premium',
            subscriptionId: data.subscriptionID,
          };
          console.log('[3] Calling /api/subscription/create with:', requestBody);
          
          // Call backend API
          const response = await fetch('/api/subscription/create', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(requestBody),
          });
          
          console.log('[4] API Response Status:', response.status, response.statusText);
          
          if (!response.ok) {
            const errorData = await response.json();
            console.error('[4] ❌ API Error Response:', errorData);
            throw new Error(errorData.error || errorData.message || 'Failed to save subscription');
          }
          
          const result = await response.json();
          console.log('[5] ✅ API Success Response:', result);
          console.log('[6] ✅ Subscription saved to database successfully!');
          console.log('========== SUBSCRIPTION FLOW SUCCESS ==========');
          
          alert(`✅ Successfully subscribed to Premium plan!\n\nYour subscription will auto-renew in 30 days.\n\nRefresh to see changes!`);
          
          // Reload page after 2 seconds
          setTimeout(() => {
            console.log('[7] Reloading page...');
            window.location.reload();
          }, 2000);
          
        } catch (error) {
          console.error('========== SUBSCRIPTION FLOW FAILED ==========');
          console.error('[ERROR]', error.message);
          console.error('[STACK]', error.stack);
          alert('❌ Subscription created but failed to save to database.\n\nError: ' + error.message + '\n\nPlease check browser console (F12) for details and report this error.');
        }
      },
      onError: function(err) {
        console.error('[PAYPAL] Payment error:', err);
        alert('Payment failed. Please try again.');
      }
  }).render('#paypal-button-container-P-51711759R0127122YNHA4ITY');
</script>
